<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mask Guard | Dashboard</title>
    <!-- Modern Dark UI Styling -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .dashboard-header { background: #1e293b; padding: 20px; border-bottom: 2px solid #334155; }
        .video-container { position: relative; border: 4px solid #334155; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-card { background: #1e293b; border-radius: 12px; padding: 20px; margin-top: 20px; border-left: 5px solid #3b82f6; }
        .alert-active { border-left-color: #ef4444; animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>
    <div class="dashboard-header text-center">
        <h2 class="fw-bold"><span class="text-info">AI</span> MASK GUARD</h2>
        <p class="text-secondary mb-0">Real-Time Computer Vision Surveillance</p>
    </div>

    <div class="container mt-4">
        <div class="row">
            <!-- Left Side: Live Feed -->
            <div class="col-lg-8">
                <div class="video-container">
                    <img src="{{ url_for('video_feed') }}" class="img-fluid w-100" alt="Live Stream">
                </div>
            </div>

            <!-- Right Side: Stats & Alerts -->
            <div class="col-lg-4">
                <div class="status-card" id="statusCard">
                    <h5>System Status</h5>
                    <p class="text-success" id="statusText">● ACTIVE - MONITORING</p>
                    <hr class="border-secondary">
                    <small class="text-secondary">Last Incident: <span id="lastIncident">None</span></small>
                </div>

                <div class="mt-4 p-3 border border-secondary rounded">
                    <h6>Security Protocol</h6>
                    <ul class="small text-secondary">
                        <li>Automatic face localization active.</li>
                        <li>88.4% Accuracy threshold enabled.</li>
                        <li>Audio alert synced with server.</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
